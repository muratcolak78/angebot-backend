name: Deploy Angebot Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.104.195.56
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/angebot-backend/angebot-backend
            git pull
            docker-compose down
            docker-compose up -d --build
