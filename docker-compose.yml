services:
  postgres:
    image: postgres:16
    container_name: angebot-postgres
    environment:
      POSTGRES_DB: angebotdb
      POSTGRES_USER: angebotuser
      POSTGRES_PASSWORD: angebotpass
    ports:
      - "5433:5432"
    volumes:
      - angebot_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    container_name: angebot-backend
    depends_on:
      - postgres
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/angebotdb
      SPRING_DATASOURCE_USERNAME: angebotuser
      SPRING_DATASOURCE_PASSWORD: angebotpass
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  angebot_postgres_data:
